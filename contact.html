<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        h2 {
            text-align: center;
            margin-top: 40px;
            font-size: 30px;
        }

        /* Container */
        .nahida {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        /* Cards */
        .alhaitham {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            width: 230px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .alhaitham:hover {
            
            background: rgba(255,255,255,0.2);
        }

        .alhaitham h3 {
            margin-bottom: 10px;
            color: #00c6ff;
        }

        .alhaitham p {
            color: #ddd;
        }

        .alhaitham a {
            display: block;
            margin-top: 8px;
            text-decoration: none;
            color: white;
            padding: 6px;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .alhaitham a:hover {
            background: #00c6ff;
            color: black;
        }
        .kazuha-button {
            bottom: 20px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            display: block;
            margin: 40px auto;
            text-align: center;
        }   
    </style>
</head>
<body>
<section id="contact" class="kokomi">
  <h2>Contact Me</h2>

  <div class="nahida">
    
    <div class="alhaitham">
      <h3> Email</h3>
      <p>aragonryandave@gmail.com.com</p>
    </div>

    <div class="alhaitham">
      <h3> Phone</h3>
      <p>+63 912 345 6789</p>
    </div>

    <div class="alhaitham">
      <h3> Social</h3>
      <a href="https://www.facebook.com/ryandave.aragon.5" target="_blank">Facebook</a>
    </div>

  </div>
</section>
<a href="index.html" class="kazuha-button"><b>Back Home</b></a>
</body>
</html>

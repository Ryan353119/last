<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hobbies</title>

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      color: #00c6ff;
    }

    .scara {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 40px;
    }

    .itto {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      width: 220px;
      border-radius: 15px;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    
    .itto h3 {
      color: #00c6ff;
      margin-bottom: 10px;
    }

    .itto p {
      color: #ddd;
      font-size: 14px;
    }

    .kazuha-button {
      bottom: 20px;
      text-decoration: none;
      color: white;
      font-size: 14px;
      display: block;
      margin: 40px auto;
      text-align: center;
    }

    
  </style>
</head>

<body>

  <h1>My Hobbies</h1>

  <div class="scara">

    <div class="itto">
      <h3> Gaming</h3>
      <p>I enjoy playing online games like ML, Valorant, and Genshin Impact.</p>
    </div>

    <div class="itto">
      <h3> Music</h3>
      <p>I listen to music when studying or relaxing.</p>
    </div>

    <div class="itto">
       <h3> Watching Anime</h3>
      <p>I enjoy watching anime like Naruto, One Piece, and Kingdom.</p>
    </div>

    <div class="itto">
      <h3> Social Media</h3>
      <p>I enjoy browsing Facebook, TikTok, and Instagram.</p>
    </div>

  </div>

  <a href="index.html" class="kazuha-button"><b>Back Home</b></a>

</body>
</html>

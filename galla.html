<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
      z-index: -1;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      font-size: 35px;
      color: #00e5ff;
      text-shadow: 0 0 10px #00e5ff;
    }

    .zhongli {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px 10%;
    }

    .raiden {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .raiden:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00e5ff;
    }

    .raiden img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .raiden p {
      padding: 10px;
      font-size: 14px;
      color: #ddd;
    }

     .kazuha-button {
      bottom: 20px;
      text-decoration: none;
      color: white;
      font-size: 14px;
      display: block;
      margin: 40px auto;
      text-align: center;
    }
  </style>
</head>

<body>

  <h1> My Gallery</h1>

  <div class="zhongli">

    <div class="raiden">
      <img src="images/7e0bf442-c430-4d19-af4c-613b69f711c8.jpg" alt="">
    </div>

    <div class="raiden">
      <img src="images/e7b986a8-335a-4f67-937b-c542b88e6584.jpg" alt="">
    </div>

    <div class="raiden">
      <img src="images/fcc75e9f-0b5a-487d-bade-5a66c8a7341c.jpg" alt="">
    </div>

    <div class="raiden">
      <img src="images/07f3ae96-5590-4d24-bfed-28cd90984916.jpg" alt="">
    </div>

  </div>

  <a href="index.html" class="kazuha-button"><b>Back Home</b></a>

</body>
</html>
